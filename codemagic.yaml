workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Tanga Academie ASC Key

    environment:
      groups:
        - .env
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tangaacademie.app
      vars:
        BUNDLE_ID: com.tangaacademie.app

    scripts:
      - name: Create .env
        script: |
          echo "API_URL=$API_URL" > .env

      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=$(cat pubspec.yaml | grep "^version:" | awk '{print $2}' | cut -d+ -f1) \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=ios/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - stanleymwendwa03@gmail.com
        notify:
          success: true
          failure: true
